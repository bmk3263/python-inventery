apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: sampledb
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres123
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: postgres-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-python-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-python-app
  template:
    metadata:
      labels:
        app: my-python-app
    spec:
      containers:
      - name: web-app
        image: mbattini/local-python-app:v3
        imagePullPolicy: IfNotPresent 
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: postgres-service  # Matches the metadata name of the Service above
        - name: DB_NAME
          value: sampledb
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: postgres123
---
apiVersion: v1
kind: Service
metadata:
  name: my-python-service
spec:
  type: NodePort
  selector:
    app: my-python-app
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 32000
